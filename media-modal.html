<!-- Media Upload Modal -->
<div id="mediaModal" class="media-modal">
  <div class="media-modal-overlay"></div>
  <div class="media-modal-content">
    <div class="media-modal-header">
      <h3><i class="fas fa-images"></i> Add Media</h3>
      <button class="media-modal-close" id="mediaModalClose" aria-label="Close modal">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="media-modal-body">
      <div class="media-upload-area">
        <label for="mediaFileInput" class="media-upload-btn">
          <i class="fas fa-cloud-upload-alt"></i>
          <span>Choose Images or Videos</span>
          <input type="file" id="mediaFileInput" accept="image/*,video/*" multiple>
        </label>
        <p class="media-upload-hint">PNG, JPG, MP4, WebM (Max 50MB each)</p>
      </div>
      <div class="media-preview-container" id="mediaPreviewContainer">
        <!-- Previews will be inserted here -->
      </div>
    </div>
    <div class="media-modal-footer">
      <button class="btn btn-secondary" id="mediaCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="mediaSaveBtn"><i class="fas fa-save"></i> Save Media</button>
    </div>
  </div>
</div>
